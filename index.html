<style>
:root{
  --ink:#14121B;        /* deep plum-ink base */
  --card:#1E1B27;
  --card2:#262231;
  --line:#332D42;
  --line-soft:#292437;
  --text:#EFEBF5;
  --muted:#9C94B0;
  --faint:#6E6683;
  --brass:#D6B172;      /* accent: CTAs, goal fill, quality tier */
  --brass-dim:#8a744e;
  --peri:#918FF2;       /* momentum / speculative tier */
  --up:#7FCBA4;
  --down:#E0715F;
  --shadow:0 12px 32px rgba(0,0,0,.35);
  --r:16px;
  --font-ui:'Archivo',system-ui,sans-serif;
  --font-display:'Fraunces',Georgia,serif;
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--ink);color:var(--text);
  font-family:var(--font-ui);font-size:15px;line-height:1.5;
  min-height:100dvh;
}
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative}
.view{flex:1;padding:20px 20px 96px;animation:fadein .28s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

h1,h2,.display{font-family:var(--font-display);font-weight:560;letter-spacing:-.01em}
.script{font-family:var(--font-display);font-style:italic;font-weight:540}
.mono{font-family:var(--font-mono)}
button{font-family:var(--font-ui);cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
button:focus-visible,input:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--brass);outline-offset:2px;border-radius:6px}
input,textarea{font-family:var(--font-ui);color:var(--text);background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:16px;width:100%}
input::placeholder,textarea::placeholder{color:var(--faint)}

/* ---------- shared bits ---------- */
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:600}
.tier{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:3px 9px;border-radius:99px;border:1px solid}
.tier.quality{color:var(--brass);border-color:rgba(214,177,114,.4)}
.tier.momentum{color:var(--peri);border-color:rgba(145,143,242,.4)}
.tier .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.btn{display:block;width:100%;text-align:center;padding:15px;border-radius:14px;font-weight:600;font-size:15px;transition:transform .12s ease,opacity .12s ease}
.btn:active{transform:scale(.985)}
.btn-primary{background:var(--brass);color:#231C0E}
.btn-primary:disabled{opacity:.35;cursor:default}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
.btn-quiet{color:var(--muted);font-weight:500;padding:12px}
.chip{padding:8px 14px;border-radius:99px;border:1px solid var(--line);color:var(--muted);font-size:13.5px;font-weight:500;transition:all .12s}
.chip.on{border-color:var(--brass);color:var(--brass);background:rgba(214,177,114,.08)}
.card{background:var(--card);border:1px solid var(--line-soft);border-radius:var(--r);padding:18px}
.hr{height:1px;background:var(--line-soft);margin:16px 0;border:none}
.row{display:flex;align-items:center;gap:10px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px}
.up{color:var(--up)} .down{color:var(--down)}
.small{font-size:12.5px;color:var(--muted)}
.tiny{font-size:11.5px;color:var(--faint)}

/* bilingual stat pair — equal weight, always on */
.pair{display:flex;flex-direction:column;gap:1px}
.pair .term{font-size:12px;color:var(--text);font-weight:600}
.pair .plain{font-size:12px;color:var(--muted);font-weight:400}

/* ---------- pulses (signature glyphs) ---------- */
.rangebar{position:relative;height:4px;border-radius:2px;background:var(--line);width:100%}
.rangebar .pin{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:var(--brass);box-shadow:0 0 0 3px rgba(214,177,114,.18)}
.arc{display:inline-block;vertical-align:middle}
.sline{display:block}

/* ---------- top bar & nav ---------- */
.topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.brand{font-family:var(--font-display);font-style:italic;font-weight:540;font-size:21px;color:var(--text)}
.brand em{font-style:italic;color:var(--brass)}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:rgba(20,18,27,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line-soft);padding:6px 8px calc(10px + env(safe-area-inset-bottom));z-index:40}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;color:var(--faint);font-size:11px;font-weight:600;letter-spacing:.04em}
.nav button.on{color:var(--brass)}
.nav svg{width:21px;height:21px}

/* ---------- goal meter (fillable vessel) ---------- */
.vessel{position:relative;height:14px;border-radius:99px;background:var(--card2);border:1px solid var(--line);overflow:hidden}
.vessel .fill{position:absolute;inset:0;width:0%;background:linear-gradient(90deg,var(--brass-dim),var(--brass));border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.vessel .ghost{position:absolute;inset:0;width:0%;background:rgba(214,177,114,.22);border-radius:99px}
.vessel .tick{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--text);opacity:.5}

/* ---------- discover feed ---------- */
.coll{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line-soft);border-radius:var(--r);padding:20px;margin-bottom:14px;transition:border-color .15s}
.coll:active{border-color:var(--brass-dim)}
.coll h2{font-size:23px;line-height:1.2;margin:8px 0 6px;font-style:italic;font-weight:540}
.coll p{color:var(--muted);font-size:14px}
.coll .meta{margin-top:12px;display:flex;justify-content:space-between;align-items:center}

/* ---------- card stack ---------- */
.stack{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:14px;padding:4px 20px 20px;margin:0 -20px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stack::-webkit-scrollbar{display:none}
.scard{scroll-snap-align:center;flex:0 0 calc(100% - 48px);background:var(--card);border:1px solid var(--line-soft);border-radius:20px;padding:20px;box-shadow:var(--shadow)}
.pulse{padding:13px 0;border-top:1px solid var(--line-soft)}
.pulse:first-of-type{border-top:none}
.pulse .plabel{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:8px}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
.voice{font-family:var(--font-display);font-style:italic;font-size:15px;color:var(--text);margin-top:10px;line-height:1.45}
.dots{display:flex;justify-content:center;gap:6px;margin-top:2px}
.dots i{width:5px;height:5px;border-radius:50%;background:var(--line)}
.dots i.on{background:var(--brass)}

/* case file */
.case{margin-top:12px;border:1px dashed var(--line);border-radius:12px;padding:14px;display:none}
.case.open{display:block}
.case .kv{margin-bottom:10px}
.case .kv:last-child{margin-bottom:0}
.case .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:2px}
.case .v{font-size:13.5px;color:var(--muted)}

/* ---------- sheets / overlays ---------- */
.sheet-veil{position:fixed;inset:0;background:rgba(10,8,16,.6);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.sheet{width:100%;max-width:480px;background:var(--card);border-radius:22px 22px 0 0;border:1px solid var(--line);border-bottom:none;padding:22px 20px calc(24px + env(safe-area-inset-bottom));max-height:88dvh;overflow-y:auto;animation:slideup .3s cubic-bezier(.2,.8,.2,1)}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.grab{width:36px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 16px}

/* ---------- thesis note (signature artifact) ---------- */
.note{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:18px;position:relative}
.note::before{content:'❝';position:absolute;top:8px;left:14px;font-family:var(--font-display);font-size:26px;color:var(--brass);opacity:.7}
.note .qt{font-family:var(--font-display);font-style:italic;font-size:16.5px;line-height:1.55;padding-left:22px}
.note .sig{margin-top:12px;padding-left:22px;font-size:12px;color:var(--faint)}
.note .qt b{color:var(--brass);font-weight:560}

/* verdict */
.verdict-stamp{display:inline-block;font-family:var(--font-display);font-style:italic;font-weight:560;font-size:26px;padding:6px 18px;border:2px solid;border-radius:12px;transform:rotate(-2deg)}
.v-called{color:var(--up);border-color:var(--up)}
.v-partial{color:var(--brass);border-color:var(--brass)}
.v-missed{color:var(--down);border-color:var(--down)}

/* compare table */
.cmp{width:100%;border-collapse:collapse;font-size:13px}
.cmp th{text-align:left;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:8px 6px;border-bottom:1px solid var(--line)}
.cmp td{padding:10px 6px;border-bottom:1px solid var(--line-soft);vertical-align:middle}

/* positions */
.pos{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line-soft);border-radius:var(--r);padding:16px;margin-bottom:12px}

/* toast */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:92px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:11px 18px;font-size:13.5px;z-index:60;box-shadow:var(--shadow);animation:fadein .25s ease}

/* nudge banner */
.nudge{position:sticky;bottom:84px;margin:14px 0 0;background:linear-gradient(120deg,#2A2438,#241F31);border:1px solid var(--line);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.nudge p{font-size:13.5px;flex:1}
.nudge button{color:var(--brass);font-weight:600;white-space:nowrap;font-size:13.5px}

.demo-pill{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:var(--faint);border:1px dashed var(--line);border-radius:99px;padding:5px 12px}
.demo-pill button{color:var(--brass);font-weight:600;font-size:11.5px}
</style>

const Store = (() => {
  const KEY = 'hunch-state-v1';
  let mem = null;
  async function load(){
    try{ if(window.storage){ const r = await window.storage.get(KEY); if(r&&r.value) return JSON.parse(r.value);} }catch(e){}
    try{ const r = localStorage.getItem(KEY); if(r) return JSON.parse(r); }catch(e){}
    return mem;
  }
  async function save(s){
    mem = s;
    try{ if(window.storage){ await window.storage.set(KEY, JSON.stringify(s)); return; } }catch(e){}
    try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){}
  }
  return {load, save};
})();

/* ---------------- price feed (DEMO: seeded random walk) ---------------- */
const PriceFeed = (()=>{
  function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
  function advance(prices, day){
    const out = {};
    for(const s of STOCKS){
      const rnd = mulberry(day*7919 + s.sym.length*131 + s.sym.charCodeAt(0)*17)();
      const drift = s.mom*0.004 + (s.pg-15)*0.00012;
      const vol = s.vflag? 0.028 : 0.014;
      const shock = (rnd-0.5)*2*vol;
      out[s.sym] = +( (prices[s.sym]||s.price) * (1+drift+shock) ).toFixed(2);
    }
    return out;
  }
  return {advance};
})();

function arcGlyph(m){ // momentum as directional arc, -1..1
  const col = m>0.05?'var(--up)':(m<-0.05?'var(--down)':'var(--muted)');
  const sweep = Math.abs(m);
  const y2 = 16 - m*10;
  return `<svg class="arc" width="46" height="22" viewBox="0 0 46 22" aria-label="momentum ${m>0?'up':m<0?'down':'flat'}"><path d="M4 ${16+ (m<0? -m*6:0)} Q 23 ${16 - m*22} 42 ${y2}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linecap="round" opacity="${0.5+sweep*0.5}"/><circle cx="42" cy="${y2}" r="2.6" fill="${col}"/></svg>`;
}
function sparkline(pts, w=110, h=30){
  const mn=Math.min(...pts), mx=Math.max(...pts), rg=(mx-mn)||1;
  const step=w/(pts.length-1);
  const d=pts.map((p,i)=>`${i?'L':'M'}${(i*step).toFixed(1)} ${(h-3-((p-mn)/rg)*(h-6)).toFixed(1)}`).join(' ');
  const up = pts[pts.length-1]>=pts[0];
  return `<svg class="sline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path d="${d}" fill="none" stroke="${up?'var(--up)':'var(--down)'}" stroke-width="2" stroke-linecap="round"/></svg>`;
}

const SIZE_BANDS={low:[0.05,0.10],medium:[0.10,0.18],high:[0.18,0.25]};
function sizeStep(s){
  const t=S.goal.target;
  return `<p class="eyebrow">Step 2 of 3 · The size</p>
  <h2 class="script" style="font-size:23px;margin:6px 0 4px">How sure are you?</h2>
  <p class="small" style="margin-bottom:14px">Your goal's risk budget: up to <span class="mono">25%</span> (${fmt(t*0.25)}) in any single pick. A guide, not a gate.</p>
  <div class="row" style="gap:8px;margin-bottom:16px">
    ${['low','medium','high'].map(c=>`<button class="chip cchip" data-c="${c}">${c}</button>`).join('')}
  </div>
  <div id="sizebox" style="display:none">
    <p class="tiny" style="margin-bottom:6px">SUGGESTED FOR THIS CONVICTION: <span id="srange" class="mono" style="color:var(--brass)"></span></p>
    <input id="samt" type="number" inputmode="numeric" placeholder="Amount in ₹" style="margin-bottom:10px">
    <div id="softwarn"></div>
    <p class="tiny" style="margin:12px 0 6px">YOUR GOAL, WITH THIS DEPLOYED</p>
    <div id="ghostmeter">${goalMeter(0)}</div>
    <button class="btn btn-primary" id="snext" disabled style="margin-top:16px">Review the call →</button>
  </div>`;
}
function wireSize(s){
  const t=S.goal.target;
  document.querySelectorAll('.cchip').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.cchip').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    draft.conviction=b.dataset.c;
    const [lo,hi]=SIZE_BANDS[draft.conviction];
    byId('sizebox').style.display='block';
    byId('srange').textContent=`${fmt(t*lo)} – ${fmt(t*hi)}`;
    if(!byId('samt').value) byId('samt').value=Math.round(t*(lo+hi)/2/100)*100;
    byId('samt').dispatchEvent(new Event('input'));
  });
  document.body.addEventListener('input',function h(e){
    if(e.target && e.target.id==='samt'){
      const a=+e.target.value||0; draft.amount=a;
      byId('snext').disabled=!(a>0);
      byId('ghostmeter').innerHTML=goalMeter(a);
      const w=byId('softwarn'), share=a/t;
      if(share>0.4) w.innerHTML=`<p class="small" style="color:var(--down)">You're really committing here — that's <span class="mono">${(share*100).toFixed(0)}%</span> of the whole goal in one stock. Most spread this across 3–4 picks. Your call, always.</p>`;
      else if(share>0.25) w.innerHTML=`<p class="small" style="color:var(--brass)">That's past your <span class="mono">25%</span> single-pick budget (${(share*100).toFixed(0)}%). Fine if it's deliberate.</p>`;
      else w.innerHTML='';
    }
  });
  const n=byId('snext'); if(n) n.onclick=()=>{ openSheet(confirmStep(s)); wireConfirm(s); };
}
function noteHtml(th, sym, dated){
  const r=REASONS.find(x=>x.k===th.reasonType);
  return `<div class="note"><p class="qt">Betting <b>UP</b> on ${esc(stock(sym).name)} because <b>${esc(th.reasonText)}</b> <span class="tiny">(${r?r.label.toLowerCase():''})</span> — expecting <b>+${th.target}%</b> within <b>${th.horizon} market days</b>.</p>
  <p class="sig">— you, day ${dated} · private until this resolves</p></div>`;
}
function confirmStep(s){
  const cur=price(s.sym);
  return `<p class="eyebrow">Step 3 of 3 · The call</p>
  <h2 class="script" style="font-size:23px;margin:6px 0 14px">Read it back.</h2>
  ${noteHtml(draft, draft.sym, S.day)}
  <div class="spread" style="margin:16px 0">
    <div class="pair"><span class="term mono" style="font-size:16px">${fmt(draft.amount)}</span><span class="plain">virtual capital in</span></div>
    <div class="pair" style="text-align:right"><span class="term mono" style="font-size:16px">${fmt(cur)}</span><span class="plain">entry price · live-tracked</span></div>
  </div>
  <button class="btn btn-primary" id="exec">Place the call</button>
  <button class="btn btn-quiet" onclick="closeSheet()" style="width:100%">Not yet</button>
  <p class="tiny" style="text-align:center;margin-top:6px">Virtual money in v1. Real broker execution (Kite / Groww / Upstox) lands in v2 — this exact screen will resurface your thesis before any real order fires.</p>`;
}
function wireConfirm(s){
  byId('exec').onclick=async ()=>{
    const drivers=['fundamentals','momentum','story'];
    const c=collOf(s.coll);
    /* hidden actual driver, weighted by collection tier — revealed at verdict */
    const seed=(s.sym.charCodeAt(0)+S.day*13)%10;
    const actual = c.tier==='momentum' ? (seed<5?'momentum':seed<8?'story':'fundamentals')
                                       : (seed<5?'fundamentals':seed<8?'story':'momentum');
    S.positions.push({ id:Date.now(), sym:s.sym, amount:draft.amount, entry:price(s.sym),
      openedDay:S.day, actualDriver:actual,
      thesis:{reasonType:draft.reasonType, reasonText:draft.reasonText, target:draft.target, byDay:S.day+draft.horizon} });
    await persist(); closeSheet(); go('home'); toast('Call placed. Now we wait — that\'s the hard part.');
  };
}

/* ---------------- portfolio + verdicts ---------------- */
function viewPortfolio(){
  return `<div class="view">
    <div class="topbar"><span class="brand">hunch<em>.</em></span>
      <span class="demo-pill">day ${S.day} · demo prices <button id="tick">advance ›</button></span></div>
    <h1 style="font-size:26px;margin-bottom:4px">Your record</h1>
    <p class="small" style="margin-bottom:20px">Tracked against <em>${esc(S.goal.name)}</em> — the goal is the scoreboard, not raw P&amp;L.</p>
    ${goalMeter()}
    <p class="eyebrow" style="margin:24px 0 12px">Open calls</p>
    ${S.positions.length? S.positions.map(posRow).join(''):'<p class="small" style="margin-bottom:8px">None open. The market will still be here tomorrow.</p>'}
    <p class="eyebrow" style="margin:24px 0 12px">Resolved</p>
    ${S.closed.length? S.closed.slice().reverse().map(closedRow).join(''):'<p class="small">Verdicts land here when a call hits its date, its target, or you close it.</p>'}
  </div>`;
}
function closedRow(p){
  const cls=p.verdict==='Called it'?'v-called':p.verdict==='Missed it'?'v-missed':'v-partial';
  return `<button class="pos" data-closed="${p.id}"><div class="spread">
    <div><strong>${esc(stock(p.sym).name)}</strong><div class="tiny mono">${pct(p.finalPct)} vs target ${pct(p.thesis.target)}</div></div>
    <span class="verdict-stamp ${cls}" style="font-size:14px;padding:3px 10px">${p.verdict}</span>
  </div></button>`;
}
function judge(p, finalPrice){
  const finalPct=((finalPrice/p.entry)-1)*100;
  const reached=finalPct>=p.thesis.target;
  const match=p.actualDriver===p.thesis.reasonType;
  let verdict, why;
  const DRIVERLINE={fundamentals:'the quarter\'s numbers did the lifting', momentum:'the price trend carried it — flows, not fundamentals', story:'the narrative/catalyst moved it, not the underlying numbers'};
  if(reached && match){ verdict='Called it'; why='Target hit, and for the reason you named. That\'s the whole game.'; }
  else if(reached){ verdict='Right for the wrong reason'; why=`Target hit — but ${DRIVERLINE[p.actualDriver]}. You banked the gain; bank the lesson too.`; }
  else { verdict='Missed it'; why= finalPct>0? 'Direction right, target too ambitious for the window. Closer than the stamp suggests.' : 'The thesis didn\'t play out in this window. That\'s tuition, not failure.'; }
  return { ...p, finalPrice, finalPct, proceeds:p.amount*(finalPrice/p.entry), verdict, why, closedDay:S.day };
}
function resolvePosition(id, manual){
  const i=S.positions.findIndex(x=>x.id===id); if(i<0) return;
  const p=S.positions[i]; const r=judge(p, price(p.sym));
  S.positions.splice(i,1); S.closed.push(r); persist();
  showVerdict(r);
}
function showVerdict(r){
  const cls=r.verdict==='Called it'?'v-called':r.verdict==='Missed it'?'v-missed':'v-partial';
  openSheet(`
    <p class="eyebrow" style="margin-bottom:10px">The verdict · ${esc(stock(r.sym).name)}</p>
    <div style="text-align:center;margin:10px 0 18px"><span class="verdict-stamp ${cls}">${r.verdict}</span></div>
    ${noteHtml(r.thesis, r.sym, r.openedDay)}
    <div class="spread" style="margin:16px 0">
      <div class="pair"><span class="term mono ${r.finalPct>=0?'up':'down'}" style="font-size:16px">${pct(r.finalPct)}</span><span class="plain">actual move</span></div>
      <div class="pair" style="text-align:right"><span class="term mono" style="font-size:16px">+${r.thesis.target}%</span><span class="plain">you expected</span></div>
    </div>
    <p class="small" style="margin-bottom:16px">${r.why}</p>
    <button class="btn btn-ghost" id="shareV">Share this verdict</button>
    <p class="tiny" style="text-align:center;margin-top:8px">Sharing is opt-in, only ever after resolution. Skipping it is a fine choice.</p>
    <button class="btn btn-quiet" style="width:100%" onclick="closeSheet();render()">Done</button>
  `);
  byId('shareV').onclick=()=>{
    const txt=`${r.verdict} — ${stock(r.sym).name}: called +${r.thesis.target}%, got ${pct(r.finalPct)}. My reason: "${r.thesis.reasonText}". (hunch.)`;
    if(navigator.share){ navigator.share({text:txt}).catch(()=>{}); }
    else { navigator.clipboard && navigator.clipboard.writeText(txt); toast('Copied — paste it anywhere.'); }
  };
}
function openPosition(id){
  const p=S.positions.find(x=>x.id===id); if(!p) return;
  const cur=price(p.sym), ch=((cur/p.entry)-1)*100;
  openSheet(`
    <p class="eyebrow" style="margin-bottom:6px">Open call · ${esc(stock(p.sym).name)}</p>
    ${noteHtml(p.thesis,p.sym,p.openedDay)}
    <div class="spread" style="margin:16px 0">
      <div class="pair"><span class="term mono ${ch>=0?'up':'down'}" style="font-size:16px">${pct(ch)}</span><span class="plain">since entry (${fmt(p.entry)} → ${fmt(cur)})</span></div>
      <div class="pair" style="text-align:right"><span class="term mono" style="font-size:16px">day ${p.thesis.byDay}</span><span class="plain">deadline (${p.thesis.byDay-S.day} to go)</span></div>
    </div>
    <button class="btn btn-ghost" id="closeP">Close &amp; get the verdict</button>
    <button class="btn btn-quiet" style="width:100%" onclick="closeSheet()">Let it ride</button>
  `);
  byId('closeP').onclick=()=>resolvePosition(id,true);
}

/* ---------------- market clock ---------------- */
async function advanceDay(){
  S.day++; S.prices=PriceFeed.advance(S.prices, S.day);
  /* auto-resolve calls whose date passed */
  const due=S.positions.filter(p=>S.day>=p.thesis.byDay);
  const rest=S.positions.filter(p=>S.day<p.thesis.byDay);
  let last=null;
  for(const p of due){ last=judge(p, price(p.sym)); S.closed.push(last); }
  S.positions=rest;
  await persist(); render();
  if(last) showVerdict(last); else toast(`Day ${S.day} — prices moved.`);
}

/* ---------------- event wiring ---------------- */
function wire(){
  document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>go(b.dataset.nav));
  document.querySelectorAll('[data-coll]').forEach(b=>b.onclick=()=>{S.coll=b.dataset.coll;S.cardIdx=0;markViewed(0);go('collection');});
  document.querySelectorAll('[data-pos]').forEach(b=>b.onclick=()=>openPosition(+b.dataset.pos));
  document.querySelectorAll('[data-closed]').forEach(b=>b.onclick=()=>{const r=S.closed.find(x=>x.id===+b.dataset.closed); if(r) showVerdict(r);});
  document.querySelectorAll('.casebtn').forEach(b=>b.onclick=()=>{const c=byId('case-'+b.dataset.sym);const open=c.classList.toggle('open');b.setAttribute('aria-expanded',open);b.textContent=open?'Close the case file ↑':'Open the case file ↓';});
  document.querySelectorAll('.callbtn').forEach(b=>b.onclick=()=>startCall(b.dataset.sym));
  const tick=byId('tick'); if(tick) tick.onclick=advanceDay;
  /* onboarding */
  const gmk=byId('gmk');
  if(gmk){
    const upd=()=>{gmk.disabled=!(byId('gname').value.trim()&&(+byId('gamt').value)>0);};
    byId('gname').oninput=upd; byId('gamt').oninput=upd;
    document.querySelectorAll('.gsug').forEach(c=>c.onclick=()=>{byId('gname').value=c.textContent;upd();});
    document.querySelectorAll('.mo').forEach(c=>c.onclick=()=>{document.querySelectorAll('.mo').forEach(x=>x.classList.remove('on'));c.classList.add('on');});
    gmk.onclick=async ()=>{
      const m=+document.querySelector('.mo.on').dataset.m;
      S.goal={name:byId('gname').value.trim(), target:+byId('gamt').value, months:m, riskPct:25};
      await persist(); go('discover');
    };
  }
  /* card stack: track index, mark viewed, trigger nudge */
  const stack=byId('stack');
  if(stack){
    let t;
    stack.addEventListener('scroll',()=>{
      clearTimeout(t);
      t=setTimeout(()=>{
        const w=stack.querySelector('.scard').offsetWidth+14;
        const i=Math.round(stack.scrollLeft/w);
        if(i!==S.cardIdx){ S.cardIdx=i; markViewed(i);
          document.querySelectorAll('#dots i').forEach((d,j)=>d.classList.toggle('on',j===i)); }
      },80);
    },{passive:true});
  }
}
function markViewed(i){
  const list=STOCKS.filter(s=>s.coll===S.coll); const s=list[i]; if(!s) return;
  S.viewed[S.coll]=S.viewed[S.coll]||[];
  if(!S.viewed[S.coll].includes(s.sym)){ S.viewed[S.coll].push(s.sym); persist(); }
  maybeNudge();
}

/* ---------------- boot ---------------- */
(async function init(){
  const saved=await Store.load();
  if(saved) S=Object.assign(S,saved);
  if(!Object.keys(S.prices).length){ for(const s of STOCKS) S.prices[s.sym]=s.price; }
  render();
  if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('sw.js'); }catch(e){} }
})();
</script>
</body>
</html>

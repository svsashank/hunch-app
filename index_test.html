<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Hunch</title>
<meta name="description" content="The market as a living field. A learning space — paper money, not advice.">
<meta name="theme-color" content="#FCFAF4">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FCFAF4;
  --card:#F7F1E6;
  --ink:#221E17;
  --sec:#8A7D66;
  --muted:#9C8F7A;
  --coral:#D8794A;
  --teal:#4E9B7E;
  --line:rgba(34,30,23,.08);
  --serif:'Fraunces',Georgia,'Times New Roman',serif;
  --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --sheet-r:26px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  background:var(--paper);color:var(--ink);
  font-family:var(--sans);font-size:15px;line-height:1.5;
  overflow:hidden;position:fixed;inset:0;width:100%;
  -webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea{font-family:var(--sans);color:var(--ink);background:rgba(255,255,255,.55);border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:16px;width:100%;-webkit-user-select:text;user-select:text}
input::placeholder,textarea::placeholder{color:var(--muted)}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--coral);outline-offset:2px;border-radius:8px}
.serif{font-family:var(--serif)}
.label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;font-family:var(--sans)}

/* ---------- the field ---------- */
#field{position:fixed;inset:0;display:block;touch-action:none;background:var(--paper)}
#fieldveil{position:fixed;inset:0;background:var(--paper);opacity:0;pointer-events:none;transition:opacity .5s ease;z-index:5}
#fieldveil.on{opacity:.55}

/* first-open line */
#firstline{position:fixed;left:0;right:0;top:22%;text-align:center;z-index:6;pointer-events:none;padding:0 36px;transition:opacity 1.1s ease}
#firstline p{font-family:var(--serif);font-size:24px;line-height:1.35;color:var(--ink);font-weight:500}
#firstline.gone{opacity:0}
#compline{position:fixed;left:0;right:0;bottom:calc(14px + env(safe-area-inset-bottom));text-align:center;z-index:6;pointer-events:none;font-size:11px;color:var(--muted);letter-spacing:.03em;transition:opacity .8s ease}
#compline.gone{opacity:0}

/* coach whispers */
.whisper{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(88px + env(safe-area-inset-bottom));z-index:38;background:var(--card);border:1px solid var(--line);border-radius:99px;padding:9px 18px;font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--sec);box-shadow:0 6px 24px rgba(34,30,23,.10);opacity:0;transition:opacity .5s ease;max-width:86vw;text-align:center}
.whisper.on{opacity:1}

/* ---------- search ---------- */
#searchwrap{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:20;width:min(440px,calc(100vw - 96px))}
#searchpill{display:flex;align-items:center;gap:8px;background:rgba(247,241,230,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:99px;padding:9px 16px;color:var(--muted);width:100%;transition:box-shadow .25s}
#searchpill svg{flex:none;opacity:.6}
#searchpill span{font-family:var(--serif);font-style:italic;font-size:14.5px}
#searchopen{position:fixed;inset:0;z-index:44;background:rgba(252,250,244,.94);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;flex-direction:column;padding:calc(16px + env(safe-area-inset-top)) 18px 18px}
#searchopen.on{display:flex}
#searchopen input{font-family:var(--serif);font-size:20px;background:transparent;border:none;border-bottom:1px solid var(--line);border-radius:0;padding:10px 2px}
#sresults{margin-top:14px;overflow-y:auto;flex:1}
.sres{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:12px 6px;border-radius:14px}
.sres:active{background:rgba(34,30,23,.04)}
.sres .dotc{width:22px;height:22px;border-radius:50%;flex:none}
.sres .nm{font-family:var(--serif);font-size:17px}
.sres .via{font-size:12px;color:var(--muted)}

/* ---------- yours affordance (moon) ---------- */
#moonbtn{position:fixed;top:calc(12px + env(safe-area-inset-top));right:12px;z-index:21;width:40px;height:40px;border-radius:50%;background:rgba(247,241,230,.82);backdrop-filter:blur(10px);border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
#moonbtn .glowdot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--coral);opacity:0;transition:opacity .4s}
#moonbtn.hasnews .glowdot{opacity:1}

/* ---------- dials ---------- */
#dialbtn{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:21;display:flex;align-items:center;gap:8px;background:rgba(247,241,230,.86);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:99px;padding:10px 18px;box-shadow:0 4px 18px rgba(34,30,23,.08)}
#dialbtn .dsum{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--sec)}
#dials{position:fixed;left:0;right:0;bottom:0;z-index:42;background:var(--card);border-radius:var(--sheet-r) var(--sheet-r) 0 0;box-shadow:0 -10px 40px rgba(34,30,23,.14);padding:20px 20px calc(24px + env(safe-area-inset-bottom));transform:translateY(105%);transition:transform .42s cubic-bezier(.32,.72,.28,1)}
#dials.on{transform:none}
.dialrow{margin-bottom:18px}
.dialrow .label{display:block;margin-bottom:9px}
.dialopts{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.dialopts::-webkit-scrollbar{display:none}
.dopt{flex:none;padding:9px 15px;border-radius:99px;border:1px solid var(--line);color:var(--sec);font-size:13.5px;font-weight:500;background:rgba(255,255,255,.4);transition:all .18s}
.dopt.on{border-color:var(--ink);color:var(--ink);background:rgba(255,255,255,.75)}
.dopt:disabled{opacity:.35}

/* ---------- scrim + sheets ---------- */
#scrim{position:fixed;inset:0;background:rgba(34,30,23,.18);opacity:0;pointer-events:none;transition:opacity .35s;z-index:40}
#scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:46;background:var(--card);border-radius:var(--sheet-r) var(--sheet-r) 0 0;box-shadow:0 -12px 48px rgba(34,30,23,.16);padding:22px 22px calc(28px + env(safe-area-inset-bottom));transform:translateY(105%);transition:transform .45s cubic-bezier(.32,.72,.28,1);max-height:88dvh;overflow-y:auto;-webkit-user-select:none}
.sheet.on{transform:none}
.sheet .grab{width:36px;height:4px;border-radius:2px;background:rgba(34,30,23,.14);margin:0 auto 16px}
.bigserif{font-family:var(--serif);font-size:23px;line-height:1.32;font-weight:500}
@media(min-width:560px){.sheet,#dials{max-width:520px;left:50%;transform:translate(-50%,105%)}.sheet.on,#dials.on{transform:translate(-50%,0)}}

/* ---------- the card (bloom) ---------- */
#bloom{position:fixed;z-index:45;border-radius:50%;pointer-events:none;will-change:transform,border-radius,width,height;display:none}
#cardwrap{position:fixed;inset:0;z-index:45;display:none;flex-direction:column;justify-content:flex-end;pointer-events:none}
#cardwrap.on{display:flex}
#card{pointer-events:auto;position:relative;border-radius:30px 30px 0 0;max-height:88dvh;overflow-y:auto;overscroll-behavior:contain;padding:26px 24px calc(30px + env(safe-area-inset-bottom));opacity:0;transition:opacity .3s ease .12s;box-shadow:0 -12px 48px rgba(34,30,23,.18)}
#card.vis{opacity:1}
@media(min-width:560px){#cardwrap{align-items:center}#card{max-width:520px;width:100%;border-radius:30px;margin-bottom:4dvh}}
.chd{display:flex;align-items:center;gap:11px;margin-bottom:4px}
.chd .chip-dot{width:16px;height:16px;border-radius:50%;flex:none;box-shadow:0 0 0 4px rgba(255,255,255,.35)}
.chd h2{font-family:var(--serif);font-weight:600;font-size:26px;letter-spacing:-.01em}
.sigline{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--sec);margin:2px 0 20px}
.noticeline{font-size:12.5px;color:var(--muted);margin:-12px 0 18px;font-style:italic;font-family:var(--serif)}

/* facet deck */
#deck{position:relative;min-height:196px;margin-bottom:6px}
.facet{position:absolute;inset:0;opacity:0;transition:opacity .28s ease;pointer-events:none;display:flex;flex-direction:column}
.facet.on{opacity:1;pointer-events:auto}
.facet .label{margin-bottom:10px}
.facet .stmt{font-family:var(--serif);font-size:23px;line-height:1.38;font-weight:500;flex:1}
@media(max-width:380px){.facet .stmt{font-size:21px}}
.tellmore{align-self:flex-start;margin-top:12px;font-size:13px;color:var(--sec);border-bottom:1px dotted var(--muted);padding-bottom:1px}
.tellbody{margin-top:10px;font-size:13.5px;color:var(--sec);line-height:1.55;display:none}
.tellbody.on{display:block}
#pager{display:flex;gap:7px;justify-content:center;margin:14px 0 20px}
#pager .pd{width:6px;height:6px;border-radius:50%;background:rgba(34,30,23,.16);transition:all .25s}
#pager .pd.on{background:var(--ink);transform:scale(1.25)}
.pricetemp{font-family:var(--serif);font-size:16px;color:var(--ink);padding:14px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.pricetemp em{color:var(--sec);font-style:italic}
.threads{margin:18px 0 6px}
.threads .label{display:block;margin-bottom:10px}
.thread{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:99px;border:1px solid var(--line);background:rgba(255,255,255,.4);font-size:13.5px;color:var(--ink);margin:0 6px 8px 0}
.thread .arrow{color:var(--muted)}
/* the eye */
#eyerow{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:20px}
#eyehint{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--sec)}
#eyebtn{position:relative;width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,.5);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex:none}
#eyebtn svg.eyeicon{width:26px;height:26px;stroke:var(--ink);opacity:.75}
#eyering{position:absolute;inset:-1px}
#eyering circle{fill:none;stroke:var(--coral);stroke-width:2.5;stroke-linecap:round;stroke-dasharray:194;stroke-dashoffset:194;transform:rotate(-90deg);transform-origin:center}
#eyebtn.held{background:rgba(216,121,74,.12)}
#writebtn{display:none;width:100%;margin-top:18px;padding:15px;border-radius:16px;background:var(--ink);color:var(--paper);font-weight:600;font-size:15px}
#writebtn.show{display:block}

/* ---------- invitation ---------- */
#invite .trailfrag{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--sec);padding:7px 0;border-bottom:1px dashed var(--line)}
.btnrow{display:flex;gap:12px;margin-top:22px;align-items:center}
.btn-ink{flex:1;padding:15px;border-radius:16px;background:var(--ink);color:var(--paper);font-weight:600;text-align:center}
.btn-quiet{padding:15px 10px;color:var(--muted);font-weight:500}

/* ---------- composer ---------- */
#composer .sentence{font-family:var(--serif);font-size:24px;line-height:1.5;font-weight:500;margin:8px 0 4px}
.blank{display:inline-block;min-width:120px;border-bottom:2px solid rgba(34,30,23,.25);color:var(--muted);font-style:italic;padding:0 4px}
.blank.filled{color:var(--ink);font-style:normal;border-bottom-color:transparent}
.chiprow{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.cchip{padding:9px 15px;border-radius:99px;border:1px solid var(--line);background:rgba(255,255,255,.45);font-size:13.5px;color:var(--sec)}
.cchip.on{border-color:var(--ink);color:var(--ink);background:rgba(255,255,255,.8)}
#reasonbox{margin-top:6px;min-height:74px;font-family:var(--serif);font-size:16px;line-height:1.5;background:rgba(255,255,255,.55)}
#ceremony{position:fixed;inset:0;z-index:60;background:var(--paper);display:none;align-items:center;justify-content:center;padding:34px;text-align:center}
#ceremony.on{display:flex}
#ceremony p{font-family:var(--serif);font-size:24px;line-height:1.45;font-weight:500;opacity:0;transform:translateY(10px);animation:settle 1.5s ease forwards}
@keyframes settle{0%{opacity:0;transform:translateY(14px);filter:blur(3px)}60%{opacity:1;filter:blur(0)}100%{opacity:1;transform:none}}

/* ---------- sizing ---------- */
#sizesheet .sure{display:flex;gap:9px;margin:14px 0 22px}
.notch{flex:1;padding:13px 8px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.45);text-align:center;font-family:var(--serif);font-size:15px;color:var(--sec)}
.notch.on{border-color:var(--ink);color:var(--ink);background:rgba(255,255,255,.85)}
#sizesent{font-family:var(--serif);font-size:21px;line-height:1.45;font-weight:500;margin:6px 0 18px;min-height:64px}
#sizeamt{font-weight:600;transition:color .25s}
#sizeslider{width:100%;appearance:none;-webkit-appearance:none;height:34px;background:transparent}
#sizeslider::-webkit-slider-runnable-track{height:5px;border-radius:3px;background:linear-gradient(90deg,rgba(78,155,126,.4),rgba(34,30,23,.12) 60%,rgba(216,121,74,.45))}
#sizeslider::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--card);border:2px solid var(--ink);margin-top:-10.5px;box-shadow:0 2px 8px rgba(34,30,23,.18)}
#sizeslider::-moz-range-track{height:5px;border-radius:3px;background:rgba(34,30,23,.12)}
#sizeslider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--card);border:2px solid var(--ink)}
#bandnote{font-size:12.5px;color:var(--muted);margin-top:4px;min-height:18px}

/* ---------- yours ---------- */
#yours{position:fixed;inset:0;z-index:43;background:var(--paper);transform:translateY(-104%);transition:transform .5s cubic-bezier(.32,.72,.28,1);overflow-y:auto;overscroll-behavior:contain;padding:calc(20px + env(safe-area-inset-top)) 22px calc(40px + env(safe-area-inset-bottom))}
#yours.on{transform:none}
#yours .closey{position:sticky;top:0;float:right;width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;z-index:2}
.ysec{margin-bottom:34px}
.ysec>.label{display:block;margin-bottom:12px}
.goalsent{font-family:var(--serif);font-size:25px;line-height:1.4;font-weight:500}
.goalsent .onpaper{color:var(--sec);font-style:italic;font-size:17px}
#shifted{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--coral);margin-top:10px}
#constellation{position:relative;height:230px;margin-top:6px}
.cstar{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);animation:breathe 9s ease-in-out infinite}
.cstar.ringed{box-shadow:0 0 0 2px var(--paper),0 0 0 3.5px var(--ink)}
.cstar .cn{position:absolute;top:calc(100% + 4px);font-size:10.5px;color:var(--muted);white-space:nowrap;left:50%;transform:translateX(-50%)}
@keyframes breathe{0%,100%{margin-top:0}50%{margin-top:-7px}}
.hunchrow{padding:16px 0;border-bottom:1px solid var(--line)}
.hunchrow .hsent{font-family:var(--serif);font-size:17px;line-height:1.45;font-weight:500}
.hunchrow .hstat{font-size:13px;color:var(--sec);margin-top:6px}
.hunchrow .hclose{font-size:12.5px;color:var(--muted);margin-top:8px;border-bottom:1px dotted var(--muted)}
.flarerow{display:flex;gap:13px;align-items:flex-start;padding:15px 0;border-bottom:1px solid var(--line)}
.flare{width:15px;height:15px;border-radius:50%;flex:none;margin-top:4px}
.flare.hit{background:var(--teal);box-shadow:0 0 0 4px rgba(78,155,126,.18)}
.flare.miss{background:var(--muted);box-shadow:0 0 0 4px rgba(156,143,122,.16)}
.flare.wrongwhy{background:var(--coral);box-shadow:0 0 0 4px rgba(216,121,74,.18)}
.flarerow .fword{font-family:var(--serif);font-weight:600;font-size:15.5px}
.flarerow .fdet{font-size:13px;color:var(--sec);margin-top:2px}
.stylenote{font-family:var(--serif);font-style:italic;font-size:16.5px;line-height:1.5;color:var(--sec);background:var(--card);border-radius:18px;padding:16px 18px;margin-top:14px}
#demoday{margin-top:26px;text-align:center}
#demoday button{font-size:12px;color:var(--muted);border-bottom:1px dotted var(--muted);padding-bottom:1px}
.ycompline{text-align:center;font-size:11px;color:var(--muted);margin-top:30px;letter-spacing:.03em}

/* ---------- verdict card ---------- */
#verdict .vflare{width:22px;height:22px;border-radius:50%;margin-bottom:16px;animation:flarein 1.1s ease}
@keyframes flarein{0%{transform:scale(.2);opacity:0}55%{transform:scale(1.6)}100%{transform:scale(1);opacity:1}}
#verdict .vword{font-family:var(--serif);font-size:27px;font-weight:600;margin-bottom:10px}
#verdict .herwords{font-family:var(--serif);font-style:italic;font-size:17px;line-height:1.5;color:var(--sec);border-left:2.5px solid var(--line);padding-left:14px;margin:16px 0}
#verdict .whathap{font-family:var(--serif);font-size:18px;line-height:1.45}

/* zoom home */
#homebtn{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom));left:14px;z-index:21;width:42px;height:42px;border-radius:50%;background:rgba(247,241,230,.86);border:1px solid var(--line);display:none;align-items:center;justify-content:center;color:var(--sec);backdrop-filter:blur(10px)}
#homebtn.show{display:flex}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.12s!important}
  .cstar{animation:none}
}
</style>
</head>
<body>
<canvas id="field" aria-label="the market field"></canvas>
<div id="fieldveil"></div>

<div id="firstline"><p>This is the whole market.<br>You already know this neighborhood.</p></div>
<div id="complinewrap"><p id="compline">a learning space · paper money, not advice · demo data</p></div>

<div id="searchwrap"><button id="searchpill" aria-label="search the field">
<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
<span>someone on your mind?</span></button></div>

<button id="moonbtn" aria-label="yours">
<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#221E17" stroke-width="1.8"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
<span class="glowdot"></span></button>

<button id="homebtn" aria-label="whole field"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>

<button id="dialbtn" aria-label="gather and paint">
<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8A7D66" stroke-width="2"><circle cx="7" cy="7" r="3.4"/><circle cx="17" cy="15" r="3.4"/></svg>
<span class="dsum" id="dsum">by sector</span></button>

<div id="dials" role="dialog" aria-label="the two dials">
  <div class="grab"></div>
  <div class="dialrow"><span class="label">gather by</span><div class="dialopts" id="gatheropts"></div></div>
  <div class="dialrow" style="margin-bottom:4px"><span class="label">paint by</span><div class="dialopts" id="paintopts"></div></div>
</div>

<div id="searchopen">
  <input id="searchinput" placeholder="a name, a brand — Zudio works" autocomplete="off">
  <div id="sresults"></div>
</div>

<div id="scrim"></div>
<div id="bloom"></div>

<div id="cardwrap"><div id="card"></div></div>

<div class="sheet" id="invite"></div>
<div class="sheet" id="composer"></div>
<div class="sheet" id="goalsheet"></div>
<div class="sheet" id="sizesheet"></div>
<div class="sheet" id="verdict"></div>
<div id="ceremony"></div>
<div id="yours"></div>
<div class="whisper" id="whisper"></div>
<script>
'use strict';
/* =====================================================================
   Hunch v1 — the field, the encounter, the arc, the verdict.
   Single file, per spec. Content below is demo/seed data standing in
   for the offline agent pipeline (§9); every reading is descriptive.
   ===================================================================== */

/* ---------- tiny utils ---------- */
const $=s=>document.querySelector(s);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;

function prng(seed){let a=seed>>>0;return()=>{a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

const COMPANIES=RAW.map(r=>{
  const [sym,name,sector,w,temper,identity,aliases]=r;
  return {sym,name,sector,w,temper,identity,aliases:aliases||[],
    sizeBand: w>=1.0?'giant': w>=0.25?'mid':'small'};
});

/* ---------- signals (deterministic demo pipeline output) ---------- */
const SIGCACHE={};
function sig(c){
  if(SIGCACHE[c.sym])return SIGCACHE[c.sym];
  const r=prng(hashStr('sig:'+c.sym));
  const m3=Math.round((r()*44-16)); // 3-month move %
  const m6=Math.round(m3*0.9+(r()*30-10));
  const hi52=Math.round(70+r()*30); // % of 52w high
  const strength= m3>=10&&hi52>=90?'run': m3<=-6||hi52<72?'cool':'steady';
  const pcl=Math.round(r()*100); // valuation percentile vs own 5y history
  const price= pcl<=30?'cheap': pcl>=72?'pricey':'fair';
  const fii=(r()*3-1.4); // qoq FII delta pp
  const money= fii>=0.6?'in': fii<=-0.5?'out':'quiet';
  const px=Math.round(40+r()*3400);
  const out={strength,price,money,m3,m6,hi52,pcl,fii:+fii.toFixed(1),px};
  SIGCACHE[c.sym]=out; return out;
}
/* plain-speech signal phrases */
function strengthPhrase(c){const s=sig(c);
  if(s.strength==='run')return`she\u2019s on a run — up ${s.m3}% in three months and near her yearly high`;
  if(s.strength==='cool')return s.m3<0?`she\u2019s cooling — down ${Math.abs(s.m3)}% over three months`:`she\u2019s cooling — drifting well off her yearly high`;
  return`she\u2019s been steady — moving with the market, no drama`}
function pricePhrase(c){const s=sig(c);
  if(s.price==='cheap')return`going cheap — priced lower against her own earnings than she\u2019s been for most of five years`;
  if(s.price==='pricey')return`pricey — the market is paying more for her than it usually does, which means high hopes are already in the price`;
  return`fairly priced — about what the market usually pays for her`}
function moneyPhrase(c){const s=sig(c);
  if(s.money==='in')return`foreign money has been coming in — big overseas funds raised their stake last quarter`;
  if(s.money==='out')return`foreign money has been slipping out — big overseas funds trimmed their stake last quarter`;
  return`big money has been quiet — foreign holdings barely moved last quarter`}
const TEMPER_TXT={calm:'calm, slow to swing',steady:'even-keeled, moves with reason',lively:'lively, quick to swing'};

/* ---------- prices (deterministic seeded walk; demo stand-in for EOD feed) ---------- */
function price(sym,day){
  const c=BY[sym]; const s=c?sig(c):{px:100,strength:'steady'};
  const drift=s.strength==='run'?0.0016:s.strength==='cool'?-0.0009:0.0004;
  const vol=(c&&c.temper==='lively')?0.021:(c&&c.temper==='calm')?0.009:0.014;
  let p=s.px||100; const r=prng(hashStr('walk:'+sym));
  for(let d=1;d<=day;d++){p*=1+drift+(r()*2-1)*vol; }
  // consume same count regardless of path for determinism (walk is sequential anyway)
  return p;
}
function indexLevel(day){
  let p=100; const r=prng(hashStr('walk:NIFTYTM'));
  for(let d=1;d<=day;d++){p*=1+0.0005+(r()*2-1)*0.008}
  return p;
}

const cv=$('#field'),ctx=cv.getContext('2d');
let DPR=1,VW=0,VH=0;
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);VW=window.innerWidth;VH=window.innerHeight;cv.width=VW*DPR;cv.height=VH*DPR;cv.style.width=VW+'px';cv.style.height=VH+'px';fitZ=computeFitZ();cam.z=clamp(cam.z||fitZ,fitZ*0.85,fitZ*9)}
window.addEventListener('resize',resize);

/* circles */
const RMAX=560;
const circles=COMPANIES.map(c=>{
  const r=clamp(9+Math.sqrt(c.w/totalW)*RMAX,9,86);
  const h=prng(hashStr('ph:'+c.sym));
  return {c,r,x:0,y:0,vx:0,vy:0,ax:0,ay:0,
    phase:h()*Math.PI*2,per:8+h()*6,amp:6+h()*2.5};
});
const CIRC={}; circles.forEach(o=>CIRC[o.c.sym]=o);

/* group packing */
function packGroups(groups){ // groups: [{key,r}] -> positions
  const placed=[];
  const sorted=[...groups].sort((a,b)=>b.r-a.r);
  sorted.forEach((g,i)=>{
    if(i===0){g.x=0;g.y=0;placed.push(g);return}
    let best=null;
    placed.forEach(p=>{
      for(let a=0;a<24;a++){
        const ang=a/24*Math.PI*2;
        const d=p.r+g.r+18;
        const x=p.x+Math.cos(ang)*d,y=p.y+Math.sin(ang)*d;
        if(placed.every(q=>Math.hypot(q.x-x,q.y-y)>=q.r+g.r+10)){
          const score=Math.hypot(x,y*1.35);
          if(!best||score<best.score)best={x,y,score};
        }
      }
    });
    if(!best)best={x:0,y:placed.length*g.r*2,score:0};
    g.x=best.x;g.y=best.y;placed.push(g);
  });
  // center
  let mx=0,my=0;placed.forEach(g=>{mx+=g.x;my+=g.y});mx/=placed.length;my/=placed.length;
  placed.forEach(g=>{g.x-=mx;g.y-=my});
  return groups;
}
let ANCHORS={},GROUPMETA=[];
function layout(modeKey){
  const M=MODES[modeKey];
  const buckets={};M.groups.forEach(k=>buckets[k]=[]);
  circles.forEach(o=>{const g=M.of(o.c);(buckets[g]||(buckets[g]=[])).push(o)});
  const groups=M.groups.filter(k=>buckets[k].length).map(k=>{
    const area=buckets[k].reduce((a,o)=>a+o.r*o.r*Math.PI,0);
    return{key:k,r:Math.sqrt(area/Math.PI)*1.6,n:buckets[k].length};
  });
  if(M.axis){ // ordered pools along x
    let cur=0;const pad=64;
    groups.forEach((g,i)=>{g.x=cur+g.r;g.y=0;cur+=g.r*2+pad});
    const mx=(groups[0].x-groups[0].r+groups[groups.length-1].x+groups[groups.length-1].r)/2;
    groups.forEach(g=>g.x-=mx);
  } else packGroups(groups);
  ANCHORS={};GROUPMETA=groups.map(g=>({...g,label:M.label(g.key)}));
  groups.forEach(g=>ANCHORS[g.key]=g);
  // per-circle retained offset inside its group (seeded per mode+sym)
  circles.forEach(o=>{
    const g=ANCHORS[M.of(o.c)];if(!g)return;
    const rr=prng(hashStr('off:'+modeKey+':'+o.c.sym));
    const ang=rr()*Math.PI*2, dist=Math.sqrt(rr())*(g.r-o.r*0.6)*0.94;
    o.tx=g.x+Math.cos(ang)*dist; o.ty=g.y+Math.sin(ang)*dist*0.92;
  });
}

/* camera */
let cam={x:0,y:0,z:0.5},fitZ=0.5,camAnim=null;
function worldBounds(){let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;GROUPMETA.forEach(g=>{x0=Math.min(x0,g.x-g.r);x1=Math.max(x1,g.x+g.r);y0=Math.min(y0,g.y-g.r);y1=Math.max(y1,g.y+g.r)});return{x0,y0,x1,y1}}
function computeFitZ(){if(!GROUPMETA.length)return 0.5;const b=worldBounds();return Math.min(VW/(b.x1-b.x0+140),VH/(b.y1-b.y0+220))}
function animCam(to,dur){camAnim={from:{...cam},to,t0:performance.now(),dur}}
function zoomLevel(){const rel=cam.z/fitZ;return rel<1.5?0:rel<2.9?1:2}
const w2sX=x=>(x-cam.x)*cam.z+VW/2, w2sY=y=>(y-cam.y)*cam.z+VH/2;
const s2wX=x=>(x-VW/2)/cam.z+cam.x, s2wY=y=>(y-VH/2)/cam.z+cam.y;

/* physics + render */
let migrateUntil=0,labelAlpha=1,lastT=performance.now();
function tick(now){
  const dt=Math.min(.05,(now-lastT)/1000);lastT=now;
  const migrating=now<migrateUntil;
  const k=migrating?2.1:5.5, damp=migrating?0.86:0.8;
  for(const o of circles){
    o.vx=(o.vx+(o.tx-o.x)*k*dt)*damp;
    o.vy=(o.vy+(o.ty-o.y)*k*dt)*damp;
    o.x+=o.vx;o.y+=o.vy;
  }
  // light collision (skip while deep-migrating for the glide)
  if(!migrating){
    for(let i=0;i<circles.length;i++){const a=circles[i];
      for(let j=i+1;j<circles.length;j++){const b=circles[j];
        const dx=b.x-a.x,dy=b.y-a.y,rr=(a.r+b.r)*0.62;
        if(Math.abs(dx)>rr||Math.abs(dy)>rr)continue;
        const d2=dx*dx+dy*dy;if(d2>rr*rr||d2===0)continue;
        const d=Math.sqrt(d2),push=(rr-d)/d*0.5*0.28;
        a.x-=dx*push;a.y-=dy*push;b.x+=dx*push;b.y+=dy*push;
      }}
  }
  labelAlpha=lerp(labelAlpha,migrating?0:1,dt*3.2);
  if(camAnim){const p=clamp((now-camAnim.t0)/camAnim.dur,0,1),e=easeIO(p);
    cam.x=lerp(camAnim.from.x,camAnim.to.x,e);cam.y=lerp(camAnim.from.y,camAnim.to.y,e);cam.z=lerp(camAnim.from.z,camAnim.to.z,e);
    if(p>=1)camAnim=null}
  render(now);
  requestAnimationFrame(tick);
}
function render(now){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle='#FCFAF4';ctx.fillRect(0,0,VW,VH);
  const P=MODES[S.paint],lvl=zoomLevel(),t=now/1000;
  // circles
  for(const o of circles){
    const bx=reduceMotion?0:Math.sin(t/o.per*Math.PI*2+o.phase)*o.amp*0.4;
    const by=reduceMotion?0:Math.sin(t/(o.per*1.18)*Math.PI*2+o.phase*1.7)*o.amp;
    const sx=w2sX(o.x+bx),sy=w2sY(o.y+by),sr=o.r*cam.z;
    if(sx<-sr-30||sx>VW+sr+30||sy<-sr-30||sy>VH+sr+30)continue;
    if(sr<0.4)continue;
    o._sx=sx;o._sy=sy;o._sr=sr;
    const col=P.color(P.of(o.c));
    ctx.globalAlpha=0.8;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();
    if(S.news&&S.news.sym===o.c.sym){ // her world shifted — soft glow
      ctx.globalAlpha=0.32+0.14*Math.sin(t*2);
      ctx.strokeStyle='#D8794A';ctx.lineWidth=Math.max(2,sr*0.09);
      ctx.beginPath();ctx.arc(sx,sy,sr+Math.max(3,sr*0.14),0,Math.PI*2);ctx.stroke();
    }
    const hun=S.hunches.some(h=>h.sym===o.c.sym&&h.status==='open');
    if(hun){ctx.globalAlpha=0.55;ctx.strokeStyle='#221E17';ctx.lineWidth=1.4;
      ctx.beginPath();ctx.arc(sx,sy,sr+2.5,0,Math.PI*2);ctx.stroke()}
  }
  // names
  ctx.globalAlpha=1;
  if(lvl>=1){
    const thr=lvl===1?24:8.5;
    ctx.textAlign='center';ctx.textBaseline='middle';
    for(const o of circles){
      if(o._sr===undefined||o._sr<thr)continue;
      if(o._sx<-40||o._sx>VW+40||o._sy<0||o._sy>VH)continue;
      const fs=clamp(o._sr*0.32,10,16);
      ctx.font=`500 ${fs}px ${'system-ui'}`;
      ctx.fillStyle='rgba(34,30,23,.72)';
      ctx.fillText(o.c.name,o._sx,o._sy);
    }
  }
  // cluster labels
  const la=labelAlpha*(lvl===2?0.25:1);
  if(la>0.02){
    ctx.textAlign='center';
    for(const g of GROUPMETA){
      const sx=w2sX(g.x),sy=w2sY(g.y-g.r)-14;
      if(sx<-160||sx>VW+160||sy<-40||sy>VH+40)continue;
      ctx.font='italic 500 14px Fraunces,Georgia,serif';
      ctx.fillStyle=`rgba(138,125,102,${0.9*la})`;
      ctx.fillText(g.label,sx,sy);
    }
  }
}

/* ---------- input: pan / pinch / wheel / tap / double-tap / swipe-down ---------- */
let ptrs=new Map(),moved=false,lastTap=0,pinchBase=null,downAt=null,swipeStart=null;
cv.addEventListener('pointerdown',e=>{
  cv.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  moved=false;downAt={x:e.clientX,y:e.clientY,t:performance.now()};
  if(ptrs.size===1)swipeStart={x:e.clientX,y:e.clientY};
  if(ptrs.size===2){const a=[...ptrs.values()];pinchBase={d:Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y),z:cam.z,
    cx:(a[0].x+a[1].x)/2,cy:(a[0].y+a[1].y)/2,wx:s2wX((a[0].x+a[1].x)/2),wy:s2wY((a[0].y+a[1].y)/2)}}
  dismissFirst();
});
cv.addEventListener('pointermove',e=>{
  if(!ptrs.has(e.pointerId))return;
  const p=ptrs.get(e.pointerId);
  const dx=e.clientX-p.x,dy=e.clientY-p.y;
  if(Math.abs(dx)+Math.abs(dy)>3)moved=true;
  if(ptrs.size===1){
    cam.x-=dx/cam.z;cam.y-=dy/cam.z;camAnim=null;
  }
  p.x=e.clientX;p.y=e.clientY;
  if(ptrs.size===2&&pinchBase){
    const a=[...ptrs.values()];const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
    const nz=clamp(pinchBase.z*d/pinchBase.d,fitZ*0.85,fitZ*9);
    cam.z=nz;camAnim=null;
    cam.x=pinchBase.wx-(pinchBase.cx-VW/2)/cam.z;
    cam.y=pinchBase.wy-(pinchBase.cy-VH/2)/cam.z;
    coach('pinch');
  }
});
function endPtr(e){
  ptrs.delete(e.pointerId);
  if(ptrs.size<2)pinchBase=null;
  if(ptrs.size===0&&downAt&&!moved){
    const now=performance.now();
    if(now-lastTap<320){onDoubleTap(e.clientX,e.clientY);lastTap=0}
    else{lastTap=now;setTimeout(()=>{if(lastTap&&performance.now()-lastTap>=300){onTap(e.clientX,e.clientY);lastTap=0}},310)}
  }
  // swipe down to yours (from near top, fast, mostly vertical)
  if(ptrs.size===0&&swipeStart&&downAt){
    const dy=e.clientY-swipeStart.y,dx=Math.abs(e.clientX-swipeStart.x);
    if(dy>110&&dx<70&&swipeStart.y<VH*0.35&&performance.now()-downAt.t<450)openYours();
    swipeStart=null;
  }
  downAt=null;
}
cv.addEventListener('pointerup',endPtr);cv.addEventListener('pointercancel',endPtr);
cv.addEventListener('wheel',e=>{e.preventDefault();
  const wx=s2wX(e.clientX),wy=s2wY(e.clientY);
  cam.z=clamp(cam.z*(e.deltaY<0?1.12:0.89),fitZ*0.85,fitZ*9);camAnim=null;
  cam.x=wx-(e.clientX-VW/2)/cam.z;cam.y=wy-(e.clientY-VH/2)/cam.z;
  coach('pinch');
},{passive:false});
function pick(sx,sy){
  const wx=s2wX(sx),wy=s2wY(sy);let best=null;
  for(const o of circles){const d=Math.hypot(o.x-wx,o.y-wy);
    if(d<=o.r+7/cam.z&&(!best||o.r<best.r))best=o}
  return best;
}
function onTap(sx,sy){
  const o=pick(sx,sy);
  if(o)openCard(o.c.sym,'open');
}
function onDoubleTap(sx,sy){
  if(zoomLevel()>=1){goHome();return}
  const o=pick(sx,sy);const M=MODES[S.gather];
  const g=o?ANCHORS[M.of(o.c)]:nearestGroup(s2wX(sx),s2wY(sy));
  if(g)zoomToGroup(g);
}
function nearestGroup(wx,wy){let best=null,bd=1e12;GROUPMETA.forEach(g=>{const d=Math.hypot(g.x-wx,g.y-wy);if(d<bd){bd=d;best=g}});return best}
function zoomToGroup(g){
  const z=clamp(Math.min(VW/(g.r*2+90),VH/(g.r*2+190)),fitZ,fitZ*9);
  animCam({x:g.x,y:g.y,z},900);
}
function goHome(){animCam({x:0,y:0,z:fitZ},900)}
setInterval(()=>{$('#homebtn').classList.toggle('show',zoomLevel()>=1)},400);
$('#homebtn').addEventListener('click',goHome);

  for(const c of COMPANIES){
    const nm=c.name.toLowerCase(),sy=c.sym.toLowerCase();
    let via=null,ok=nm.includes(q)||sy.includes(q);
    if(!ok){const al=c.aliases.find(a=>a.toLowerCase().includes(q));if(al){ok=true;via=al}}
    if(ok)hits.push({c,via});
    if(hits.length>=8)break;
  }
  const P=MODES[S.paint];
  $('#sresults').innerHTML=hits.map(h=>`<button class="sres" data-sym="${h.c.sym}">
    <span class="dotc" style="background:${P.color(P.of(h.c))}"></span>
    <span><span class="nm">${esc(h.c.name)}</span>${h.via?` <span class="via">via ${esc(h.via)}</span>`:''}<br><span class="via">${SECTORS[h.c.sector].label}</span></span></button>`).join('')
    ||`<p style="color:var(--muted);font-family:var(--serif);font-style:italic;padding:12px 6px">no one by that name here yet</p>`;
});
$('#sresults').addEventListener('click',e=>{
  const b=e.target.closest('.sres');if(!b)return;
  $('#searchopen').classList.remove('on');
  const o=CIRC[b.dataset.sym];
  animCam({x:o.x,y:o.y,z:Math.max(cam.z,fitZ*2.4)},850);
  setTimeout(()=>openCard(b.dataset.sym,'search'),880);
});

/* ---------- trail & gravity ---------- */
function trail(sym,type,extra){S.trail.push({sym,type,day:S.day,t:Date.now(),extra:extra||null});if(S.trail.length>600)S.trail=S.trail.slice(-500);save()}
const GW={open:1,hold:3,thread:1.6,search:1.3,facet:0.25};
function gravity(sym){
  let g=0;for(const e of S.trail){if(e.sym!==sym)continue;
    g+=(GW[e.type]||0)*Math.pow(0.5,(S.day-e.day)/21)}
  return g;
}
function noticeCount(sym){return S.trail.filter(e=>e.sym===sym&&(e.type==='open'||e.type==='hold')).length}
function inviteEligible(sym){
  if(S.hunches.some(h=>h.sym===sym&&h.status==='open'))return false;
  if(S.declined[sym]!=null&&S.day-S.declined[sym]<14)return false;
  const ev=S.trail.filter(e=>e.sym===sym&&e.type!=='facet');
  const days=new Set(ev.map(e=>e.day));
  const holds=ev.filter(e=>e.type==='hold').length;
  return ev.length>=3&&days.size>=2&&holds>=1&&gravity(sym)>=4;
}

/* ---------- the card ---------- */
let cardSym=null,deckIdx=0,deckFacets=[];
function buildDeck(c){
  const P=MODES[S.paint],pk=P.of(c),sg=sig(c),d=DECKS[c.sym],f=[];
  const painted=S.paint!=='sector'&&S.paint!=='size';
  if(painted){
    const key=S.paint,phr={strength:strengthPhrase,price:pricePhrase,money:moneyPhrase}[key](c);
    const cn={run:'warm',cheap:'teal',pricey:'rose',in:'violet',out:'grey',cool:'cool',steady:'sand',fair:'sand',quiet:'sand'}[pk]||'this colour';
    f.push({label:`why she\u2019s ${cn}`,stmt:phr[0].toUpperCase()+phr.slice(1)+'.',
      tell:'How this is read: '+({strength:'her three and six-month price move, and how close she sits to her 52-week high — '+sg.m3+'% in 3 months, at '+sg.hi52+'% of her high.',
        price:'today\u2019s price against her own five-year history of earnings — currently at the '+sg.pcl+'th percentile of her usual range.',
        money:'the quarter-over-quarter change in foreign institutional holding from shareholding disclosures — '+(sg.fii>0?'+':'')+sg.fii+' percentage points last quarter.'})[key]});
  }
  f.push({label:'what she sells',stmt:d?d.sells:c.identity});
  if(d){
    // re-rank: strongest stories first
    const rest=[
      {label:'how the money works',stmt:d.money},
      {label:'who runs it',stmt:d.runs},
      {label:sg.strength==='run'?'what\u2019s fueling it':'what changed lately',stmt:d.fueling},
    ];
    if(sg.strength==='run')rest.unshift(rest.splice(2,1)[0]);
    f.push(...rest);
  } else {
    const t=SECT_TPL[c.sector];
    f.push({label:'how the money works',stmt:t.money});
  }
  f.push({label:'what could go wrong',stmt:(d?d.wrong:SECT_TPL[c.sector].wrong)+(c.temper==='lively'&&sg.strength==='run'?' Runs this hot, cools this fast.':'')});
  if(!painted||S.paint!=='price')f.push({label:'what it costs',stmt:pricePhrase(c)[0].toUpperCase()+pricePhrase(c).slice(1)+'.',
    tell:'How this is read: today\u2019s price against her own history of earnings, not against other companies.'});
  return f;
}
function openCard(sym,how){
  const o=CIRC[sym],c=o.c;
  cardSym=sym;deckIdx=0;deckFacets=buildDeck(c);
  trail(sym,how==='hold'?'open':how);
  coach('bloom');
  const P=MODES[S.paint],col=P.color(P.of(c));
  // bloom morph from circle to card
  const b=$('#bloom');
  const sx=o._sx??w2sX(o.x),sy=o._sy??w2sY(o.y),sr=Math.max(6,o._sr??o.r*cam.z);
  b.style.cssText=`display:block;left:${sx-sr}px;top:${sy-sr}px;width:${sr*2}px;height:${sr*2}px;background:${col};border-radius:50%;position:fixed`;
  $('#fieldveil').classList.add('on');
  const wrap=$('#cardwrap');wrap.classList.add('on');
  const card=$('#card');card.style.background=mixCard(col);
  renderCard(c,col);
  requestAnimationFrame(()=>{
    const r=card.getBoundingClientRect();
    const anim=b.animate([
      {left:sx-sr+'px',top:sy-sr+'px',width:sr*2+'px',height:sr*2+'px',borderRadius:'50%'},
      {left:r.left+'px',top:r.top+'px',width:r.width+'px',height:r.height+'px',borderRadius:'30px'}
    ],{duration:reduceMotion?120:420,easing:'cubic-bezier(.32,.72,.28,1)',fill:'forwards'});
    anim.onfinish=()=>{card.classList.add('vis');setTimeout(()=>b.style.display='none',80)};
  });
  // invitation check on encounter
  if(inviteEligible(sym))setTimeout(()=>{if(cardSym===sym)showInvite(sym)},1400);
}
function mixCard(col){
  if(col.startsWith('#'))return mixHex('#F7F1E6',col,0.45);
  const m=col.match(/rgb\((\d+),(\d+),(\d+)\)/);if(!m)return '#F7F1E6';
  const A=hexRGB('#F7F1E6');
  return`rgb(${Math.round(lerp(A[0],+m[1],.45))},${Math.round(lerp(A[1],+m[2],.45))},${Math.round(lerp(A[2],+m[3],.45))})`;
}
function renderCard(c,col){
  const sg=sig(c),nc=noticeCount(c.sym);
  const sigline={run:'glowing warm · she\u2019s on a run',cool:'cooling · drifting off her highs',steady:'steady · no drama lately'}[sg.strength];
  const th=(THREADS[c.sym]||[]).filter(t=>BY[t[0]]).slice(0,3);
  const held=(S.holds[c.sym]||0)>0;
  $('#card').innerHTML=`
   <div class="chd"><span class="chip-dot" style="background:${col}"></span><h2>${esc(c.name)}</h2></div>
   <p class="sigline">${sigline}</p>
   ${nc>=3?`<p class="noticeline">you keep noticing this one — ${nc} times now</p>`:''}
   <div id="deck">${deckFacets.map((f,i)=>`<div class="facet ${i===0?'on':''}" data-i="${i}">
      <span class="label">${esc(f.label)}</span><p class="stmt">${esc(f.stmt)}</p>
      ${f.tell?`<button class="tellmore">tell me more</button><p class="tellbody">${esc(f.tell)}</p>`:''}</div>`).join('')}</div>
   <div id="pager">${deckFacets.map((_,i)=>`<span class="pd ${i===0?'on':''}"></span>`).join('')}</div>
   <p class="pricetemp">${fmtR(price(c.sym,S.day))} a share · <em>${TEMPER_TXT[c.temper]}</em></p>
   ${th.length?`<div class="threads"><span class="label">her world</span>${th.map(t=>`<button class="thread" data-t="${t[0]}">${esc(t[1])}: ${esc(BY[t[0]].name)} <span class="arrow">→</span></button>`).join('')}</div>`:''}
   <div id="eyerow"><span id="eyehint">${held?'she stays with you':'hold if she stays with you'}</span>
     <button id="eyebtn" class="${held?'held':''}" aria-label="hold if she stays with you">
       <svg id="eyering" viewBox="0 0 64 64"><circle cx="32" cy="32" r="31"/></svg>
       <svg class="eyeicon" viewBox="0 0 24 24" fill="none" stroke-width="1.7"><path d="M2 12s3.6-6.5 10-6.5S22 12 22 12s-3.6 6.5-10 6.5S2 12 2 12z"/><circle cx="12" cy="12" r="2.6" fill="${held?'#D8794A':'none'}" stroke="currentColor"/></svg>
     </button></div>
   <button id="writebtn" class="${inviteEligible(c.sym)?'':''}">put your hunch down</button>`;
  wireCard(c);
}
function wireCard(c){
  const deck=$('#deck');
  deck.addEventListener('click',e=>{
    if(e.target.classList.contains('tellmore')){e.target.nextElementSibling.classList.toggle('on');return}
    flipDeck(1);
  });
  let sx0=null;
  deck.addEventListener('pointerdown',e=>sx0=e.clientX);
  deck.addEventListener('pointerup',e=>{if(sx0!=null&&Math.abs(e.clientX-sx0)>44)flipDeck(e.clientX<sx0?1:-1),sx0=null});
  document.querySelectorAll('.thread').forEach(b=>b.addEventListener('click',()=>{
    const to=b.dataset.t;
    closeCard(()=>{const o=CIRC[to];animCam({x:o.x,y:o.y,z:Math.max(cam.z,fitZ*2.4)},750);setTimeout(()=>openCard(to,'thread'),780)});
  }));
  // the eye — press and hold
  const eb=$('#eyebtn'),ring=$('#eyering circle');let hold0=null,raf=null,done=false;
  const HOLD=650;
  function step(){if(hold0==null)return;const p=clamp((performance.now()-hold0)/HOLD,0,1);
    ring.style.strokeDashoffset=194*(1-p);
    if(p>=1&&!done){done=true;commitHold(c)}else if(p<1)raf=requestAnimationFrame(step)}
  eb.addEventListener('pointerdown',e=>{e.preventDefault();done=false;hold0=performance.now();step()});
  const cancel=()=>{hold0=null;cancelAnimationFrame(raf);if(!done)ring.style.strokeDashoffset=194};
  eb.addEventListener('pointerup',cancel);eb.addEventListener('pointerleave',cancel);
  function commitHold(c){
    haptic(18);
    S.holds[c.sym]=(S.holds[c.sym]||0)+1;trail(c.sym,'hold',{paint:S.paint,facet:deckFacets[deckIdx]?.label});
    eb.classList.add('held');$('#eyehint').textContent='she stays with you';
    eb.querySelector('.eyeicon circle').setAttribute('fill','#D8794A');
    save();
    if(inviteEligible(c.sym))setTimeout(()=>{if(cardSym===c.sym)showInvite(c.sym)},900);
  }
  $('#writebtn').addEventListener('click',()=>openComposer(c.sym));
  if(gravity(c.sym)>=2.5&&!S.hunches.some(h=>h.sym===c.sym&&h.status==='open'))$('#writebtn').classList.add('show');
}
function flipDeck(dir){
  const n=deckFacets.length;deckIdx=(deckIdx+dir+n)%n;
  document.querySelectorAll('#deck .facet').forEach(f=>f.classList.toggle('on',+f.dataset.i===deckIdx));
  document.querySelectorAll('#pager .pd').forEach((p,i)=>p.classList.toggle('on',i===deckIdx));
  if(cardSym)trail(cardSym,'facet',{label:deckFacets[deckIdx]?.label});
}
function closeCard(after){
  const card=$('#card'),o=CIRC[cardSym];
  card.classList.remove('vis');
  const b=$('#bloom');
  if(o&&o._sx!==undefined&&!reduceMotion){
    const r=card.getBoundingClientRect();
    b.style.cssText=`display:block;position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px;border-radius:30px;background:${MODES[S.paint].color(MODES[S.paint].of(o.c))}`;
    const sr=Math.max(6,o._sr||10);
    b.animate([{left:r.left+'px',top:r.top+'px',width:r.width+'px',height:r.height+'px',borderRadius:'30px',opacity:1},
      {left:(o._sx-sr)+'px',top:(o._sy-sr)+'px',width:sr*2+'px',height:sr*2+'px',borderRadius:'50%',opacity:.9}],
      {duration:340,easing:'cubic-bezier(.32,.72,.28,1)'}).onfinish=()=>b.style.display='none';
  }
  setTimeout(()=>{$('#cardwrap').classList.remove('on');$('#fieldveil').classList.remove('on');cardSym=null;if(after)after()},reduceMotion?60:120);
}
$('#cardwrap').addEventListener('click',e=>{if(e.target.id==='cardwrap')closeCard()});
window.addEventListener('keydown',e=>{if(e.key==='Escape'){if(cardSym)closeCard();else if($('#yours').classList.contains('on'))closeYours()}});

/* ---------- invitation ---------- */

  showSheet($('#invite'));
  $('#inv-yes').addEventListener('click',()=>{hideSheet($('#invite'));openComposer(sym)});

}
function declineInvite(){if(inviteSym){S.declined[inviteSym]=S.day;save();inviteSym=null}hideSheet($('#invite'))}

/* ---------- composer ---------- */
let cs=null;
const DIRS=[['climb','she\u2019ll climb'],['steady','she\u2019ll hold steady'],['fall','she\u2019ll fall']];
const HORIZONS=[['q','by next quarter',63],['h','in six months',126],['y','within a year',252]];
function reasonChips(c){
  const sg=sig(c),out=[];
  out.push(strengthPhrase(c).split(' — ')[0]);
  out.push(pricePhrase(c).split(' — ')[0]);
  out.push(moneyPhrase(c).split(' — ')[0]);
  out.push('I know and use what she sells');
  if(DECKS[c.sym]){out.push('I trust who runs her');out.push('what\u2019s fueling her convinced me')}
  const fac=[...new Set(S.trail.filter(e=>e.sym===c.sym&&e.type==='facet'&&e.extra).map(e=>e.extra.label))];
  if(fac.includes('what could go wrong'))out.push('I\u2019ve read what could go wrong, and I\u2019m in anyway');
  if(S.trail.some(e=>e.sym===c.sym&&e.type==='thread'))out.push('her world pointed me here');
  return [...new Set(out)].slice(0,7);
}
function openComposer(sym){

   <span class="label">from your trail</span>
   <div class="chiprow" id="fragchips">${chips.map((f,i)=>`<button class="cchip" data-f="${i}">${esc(f)}</button>`).join('')}</div>
   <textarea id="reasonbox" placeholder="\u2026and anything in your own words" rows="2"></textarea>
   <div style="margin-top:16px"><span class="label">by when</span></div>
   <div class="chiprow" id="hchips">${HORIZONS.map(h=>`<button class="cchip" data-h="${h[0]}">${h[1]}</button>`).join('')}</div>
   <div class="btnrow"><button class="btn-ink" id="savehunch" style="opacity:.4">put it down</button></div>`;
  showSheet($('#composer'));
  const upd=()=>{
    $('#dirblank').textContent=cs.dir?DIRS.find(d=>d[0]===cs.dir)[1]:'she\u2019ll \u2026';

  $('#dirchips').addEventListener('click',e=>{const b=e.target.closest('.cchip');if(!b)return;cs.dir=b.dataset.d;

  $('#fragchips').addEventListener('click',e=>{const b=e.target.closest('.cchip');if(!b)return;const i=+b.dataset.f;
    cs.frags=cs.frags.includes(i)?cs.frags.filter(x=>x!==i):[...cs.frags,i];b.classList.toggle('on');upd()});
  $('#hchips').addEventListener('click',e=>{const b=e.target.closest('.cchip');if(!b)return;cs.horizon=b.dataset.h;
    document.querySelectorAll('#hchips .cchip').forEach(x=>x.classList.toggle('on',x===b));upd()});
  $('#reasonbox').addEventListener('input',e=>{cs.free=e.target.value;upd()});

function hunchSentence(h){const c=BY[h.sym],d=DIRS.find(x=>x[0]===h.dir)[1],hz=HORIZONS.find(x=>x[0]===h.horizon)[1];
  return`I think ${d.replace('she\u2019ll',c.name+' will')} ${hz} because ${h.reason}`}

/* ---------- sizing ---------- */
const BANDS={curious:[2,3],fairly:[4,6],sure:[8,10]};
const NOTCHES=[['curious','curious'],['fairly','fairly sure'],['sure','sure']];
function openSizing(){
  const c=BY[cs.sym];cs.sure='fairly';
  $('#sizesheet').innerHTML=`<div class="grab"></div>
   <span class="label">sizing \u2014 ${esc(c.name)}</span>
   <p class="bigserif" style="margin:8px 0 4px">How sure are you?</p>
   <div class="sure">${NOTCHES.map(n=>`<button class="notch ${n[0]==='fairly'?'on':''}" data-n="${n[0]}">${n[1]}</button>`).join('')}</div>
   <p id="sizesent"></p>
   <input type="range" id="sizeslider" min="0" max="1000" value="0">
   <p id="bandnote"></p>
   <div class="btnrow"><button class="btn-ink" id="sizeok">book it, on paper</button></div>`;
  showSheet($('#sizesheet'));
  const corpus=S.goal.amount;
  const lively=c.temper==='lively';
  function band(){const b=BANDS[cs.sure];return lively?[b[0],b[0]+(b[1]-b[0])*0.45]:b}
  function defAmt(){const b=band();return corpus*(lively?b[0]:(b[0]+b[1])/2)/100}
  const CAP=corpus*0.15;
  let amt=defAmt();
  const slider=$('#sizeslider');
  function amtFromRaw(raw){ // soft resistance beyond band top
    const b=band(),top=corpus*b[1]/100;
    const lin=corpus*0.005+ (raw/1000)*(CAP*1.35-corpus*0.005);
    return lin<=top?lin:top+(lin-top)*0.42;
  }
  function rawFromAmt(a){const b=band(),top=corpus*b[1]/100;
    const lin=a<=top?a:top+(a-top)/0.42;
    return clamp((lin-corpus*0.005)/(CAP*1.35-corpus*0.005)*1000,0,1000)}
  function paint(){
    const b=band(),top=corpus*b[1]/100,over=amt>top,hard=amt>CAP*0.999;
    amt=Math.min(amt,CAP);
    const sw=NOTCHES.find(n=>n[0]===cs.sure)[1];
    $('#sizesent').innerHTML=`${sw[0].toUpperCase()+sw.slice(1)} about a ${c.temper} company \u2014 <span id="sizeamt" style="color:${over?'#D8794A':'#221E17'}">${fmtR(amt)}</span> of your ${fmtR(corpus)} ${over?'is more than that usually means':'feels right'}.`;
    $('#bandnote').textContent= hard?'that\u2019s the 15% ceiling for one company — a felt guardrail, not a wall':
      over?'above the usual band for \u201c'+sw+'\u201d — your call, it\u2019s your paper':'';
  }
  slider.value=rawFromAmt(amt);paint();
  slider.addEventListener('input',()=>{amt=Math.round(amtFromRaw(+slider.value)/100)*100;amt=clamp(amt,corpus*0.005,CAP);paint()});
  document.querySelectorAll('.notch').forEach(n=>n.addEventListener('click',()=>{
    cs.sure=n.dataset.n;document.querySelectorAll('.notch').forEach(x=>x.classList.toggle('on',x===n));
    amt=defAmt();slider.value=rawFromAmt(amt);paint();
  }));
  $('#sizeok').addEventListener('click',()=>{
    const h={id:'h'+Date.now(),sym:cs.sym,dir:cs.dir,reason:cs.reason,horizon:cs.horizon,
      horizonD:HORIZONS.find(x=>x[0]===cs.horizon)[2],startDay:S.day,
      entry:price(cs.sym,S.day),idx0:indexLevel(S.day),amount:Math.round(amt),status:'open'};
    S.hunches.push(h);S.holds[cs.sym]=(S.holds[cs.sym]||0)+1;save();
    hideSheet($('#sizesheet'));cs=null;
    showWhisper('booked at today\u2019s close, on paper — she\u2019s ringed in ink now',3400);
  });
}

/* ---------- verdicts ---------- */
function resolveDue(){
  for(const h of S.hunches){
    if(h.status!=='open')continue;
    if(S.day-h.startDay>=h.horizonD)resolve(h,false);
  }
  save();
}
function resolve(h,early){
  const p1=price(h.sym,S.day),i1=indexLevel(S.day);
  const ret=p1/h.entry-1, iret=i1/h.idx0-1;
  const dirOK= h.dir==='climb'?ret>0.02: h.dir==='fall'?ret<-0.02: Math.abs(ret)<=0.05;
  const beat= h.dir==='fall'? (iret-ret)>=0.03 : h.dir==='climb'? (ret-iret)>=0.03 : true;
  h.status='resolved';h.closedDay=S.day;h.early=!!early;h.ret=ret;h.iret=iret;
  h.verdict= dirOK?'hit':'miss'; h.beat=beat;
  h.pending=true; // show verdict card when she opens
}
function verdictText(h){
  const c=BY[h.sym],pc=Math.round(h.ret*100),ip=Math.round((h.ret-h.iret)*100);
  if(h.verdict==='hit'){
    if(h.dir==='fall')return`She fell ${Math.abs(pc)}% \u2014 you called the slide while the market ${h.iret>=0?'held up':'slipped less'}. A correct bearish call counts double for nerve.`;
    if(h.beat)return`Up ${pc}% since you called it \u2014 ${ip} ahead of just owning everything. Your read was right, and it beat the market\u2019s.`;
    return`Up ${pc}% since you called it \u2014 though the whole market climbed alongside. Right direction; the market made it easy.`;
  }
  if(h.dir==='climb')return`She ${pc<0?'fell '+Math.abs(pc)+'%':'went sideways'} \u2014 the story you wrote didn\u2019t show up in the numbers this time. That\u2019s a data point, not a scolding.`;
  if(h.dir==='fall')return`She ${pc>0?'climbed '+pc+'%':'held steady'} \u2014 the crowd you thought would leave stayed. Worth rereading what you wrote.`;
  return`She moved ${pc}%, more than \u201csteady\u201d allows \u2014 calm was the one thing she wasn\u2019t.`;
}
function showVerdict(h){
  const c=BY[h.sym];h.pending=false;save();
  const cls=h.verdict==='hit'?'hit':h.verdict==='wrongwhy'?'wrongwhy':'miss';
  const word=h.verdict==='hit'?'Called it':h.verdict==='wrongwhy'?'Right, for the wrong reason':'Missed it';
  $('#verdict').innerHTML=`<div class="grab"></div>
   <div class="vflare flare ${cls}"></div>
   <p class="vword">${word}</p>
   <p class="herwords">\u201c${esc(hunchSentence(h))}\u201d<br><span style="font-size:13px">\u2014 you, ${h.horizonD===63?'a quarter':h.horizonD===126?'six months':'a year'} ago</span></p>
   <p class="whathap">${verdictText(h)}</p>
   <div class="btnrow"><button class="btn-ink" id="vok">into the record</button></div>`;
  showSheet($('#verdict'));
  haptic(h.verdict==='hit'?[12,80,12,80,20]:20);
  $('#vok').addEventListener('click',()=>hideSheet($('#verdict')));
}
function checkPending(){const h=S.hunches.find(h=>h.pending);if(h)setTimeout(()=>showVerdict(h),900)}

/* ---------- yours ---------- */
function corpusNow(){
  if(!S.goal)return 0;
  let v=S.goal.amount;
  for(const h of S.hunches){
    if(h.status==='open'){const raw=price(h.sym,S.day)/h.entry-1;const eff=h.dir==='fall'?-raw:raw;v+=h.amount*eff}
    else{const eff=h.dir==='fall'?-h.ret:h.ret;v+=h.amount*eff}
  }
  return v;
}
function statusLine(h){
  const raw=price(h.sym,S.day)/h.entry-1,pc=Math.round(Math.abs(raw)*100);
  const dirw=raw>=0?'up':'down';
  const left=h.horizonD-(S.day-h.startDay);
  const agree=(h.dir==='climb'&&raw>0)||(h.dir==='fall'&&raw<0)||(h.dir==='steady'&&Math.abs(raw)<0.05);
  return`${dirw} ${pc}% since you called it${agree?'':' \u2014 against your read so far'} \u00b7 ${left>0?left+' market days to your horizon':'at her horizon'}`;
}
function styleNote(){
  const done=S.hunches.filter(h=>h.status==='resolved');
  if(done.length<5)return'';
  const hits=done.filter(h=>h.verdict==='hit');
  const cheapHits=hits.filter(h=>sig(BY[h.sym]).price==='cheap').length;
  const runHits=hits.filter(h=>sig(BY[h.sym]).strength==='run').length;
  let line='';
  if(cheapHits>=hits.length*0.6&&cheapHits>=2)line='Most of your calls land when you buy good things on bad days. That\u2019s a style, and it has a name \u2014 value.';
  else if(runHits>=hits.length*0.6&&runHits>=2)line='Most of your calls land when she\u2019s already moving. That\u2019s a style, and it has a name \u2014 momentum.';
  else if(hits.length)line='Your calls land across very different companies \u2014 your edge so far is patience with your own reasons, not one kind of stock.';
  return line?`<p class="stylenote">${line}</p>`:'';
}
function openYours(){
  const y=$('#yours');
  const held=Object.keys(S.holds).filter(s=>S.holds[s]>0&&BY[s]);
  const P=MODES[S.paint];
  const hunOpen=S.hunches.filter(h=>h.status==='open');
  const done=[...S.hunches.filter(h=>h.status==='resolved')].reverse();
  const hits=done.filter(h=>h.verdict==='hit').length;
  const goalHTML=S.goal?`<p class="goalsent">${esc(S.goal.name)} \u2014 ${fmtR(corpusNow())} of ${fmtR(S.goal.amount)}, <span class="onpaper">on paper</span></p>`:
   `<p class="goalsent" style="color:var(--sec)">No goal yet \u2014 it\u2019ll be asked for the first time you size a hunch.</p>`;
  // constellation positions
  const cw=Math.min(VW-44,476),ch=230;
  const stars=held.map((s,i)=>{
    const r=prng(hashStr('star:'+s));const g=gravity(s);
    const rad=clamp(14+g*3.2,14,34);
    const ang=(i/Math.max(held.length,1))*Math.PI*2+r()*0.6, dist=60+r()*70;
    const x=cw/2+Math.cos(ang)*dist*(cw/300),yv=ch/2+Math.sin(ang)*dist*0.7;
    const ringed=S.hunches.some(h=>h.sym===s&&h.status==='open');
    return`<span class="cstar ${ringed?'ringed':''}" style="left:${clamp(x,30,cw-30)}px;top:${clamp(yv,26,ch-30)}px;width:${rad*2}px;height:${rad*2}px;background:${P.color(P.of(BY[s]))};animation-delay:${-r()*8}s"><span class="cn">${esc(BY[s].name)}</span></span>`;
  }).join('');
  y.innerHTML=`
   <button class="closey" aria-label="back to the field"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#221E17" stroke-width="2"><path d="m18 6-12 12M6 6l12 12"/></svg></button>
   <div class="ysec"><span class="label">your goal</span>${goalHTML}
     ${S.news?`<p id="shifted">her world shifted \u2014 ${esc(S.news.line)}</p>`:''}</div>
   <div class="ysec"><span class="label">your constellation</span>
     ${held.length?`<div id="constellation" style="width:${cw}px">${stars}</div>`:'<p style="color:var(--sec);font-family:var(--serif);font-style:italic">Nothing held yet. Out on the field, press and hold the eye when someone stays with you.</p>'}</div>
   <div class="ysec"><span class="label">your hunches</span>
     ${hunOpen.length?hunOpen.map(h=>`<div class="hunchrow"><p class="hsent">\u201c${esc(hunchSentence(h))}\u201d</p>
       <p class="hstat">${statusLine(h)} \u00b7 ${fmtR(h.amount)} on it</p>
       <button class="hclose" data-hc="${h.id}">I\u2019ve changed my mind \u2014 close it early</button></div>`).join(''):
     '<p style="color:var(--sec);font-family:var(--serif);font-style:italic">No hunches in ink yet. Keep wandering \u2014 the field will notice with you.</p>'}</div>
   <div class="ysec"><span class="label">your verdicts</span>
     ${done.length?`<p style="font-family:var(--serif);font-size:17px;margin-bottom:6px">${done.length} call${done.length>1?'s':''}, ${hits} landed.</p>`:''}
     ${done.map(h=>`<div class="flarerow"><span class="flare ${h.verdict==='hit'?'hit':h.verdict==='wrongwhy'?'wrongwhy':'miss'}"></span>
       <div><p class="fword">${BY[h.sym].name} \u2014 ${h.verdict==='hit'?'called it':h.verdict==='wrongwhy'?'right, for the wrong reason':'missed it'}${h.early?' \u00b7 closed early':''}</p>
       <p class="fdet">${esc(verdictText(h))}</p></div></div>`).join('')||
     '<p style="color:var(--sec);font-family:var(--serif);font-style:italic">Verdicts arrive when a hunch meets its horizon \u2014 your own words, quoted back.</p>'}
     ${styleNote()}</div>
   <div id="demoday"><button id="adv1">demo \u00b7 advance a market day</button> &nbsp;&nbsp; <button id="adv21">skip a month</button>
     <p style="font-size:11px;color:var(--muted);margin-top:6px">day ${S.day} \u00b7 prices are a seeded demo walk standing in for the EOD feed</p></div>
   <p class="ycompline">a learning space \u00b7 paper money, not advice \u00b7 every reading describes data, nothing here is a recommendation</p>`;
  y.classList.add('on');
  S.news=null;$('#moonbtn').classList.remove('hasnews');save();
  y.querySelector('.closey').addEventListener('click',closeYours);
  $('#adv1').addEventListener('click',()=>advance(1));
  $('#adv21').addEventListener('click',()=>advance(21));
  y.querySelectorAll('[data-hc]').forEach(b=>b.addEventListener('click',()=>{
    const h=S.hunches.find(x=>x.id===b.dataset.hc);if(!h)return;
    resolve(h,true);save();openYours();setTimeout(()=>showVerdict(h),500);
  }));
}
function closeYours(){$('#yours').classList.remove('on');checkPending()}
$('#moonbtn').addEventListener('click',openYours);
function advance(n){
  S.day+=n;
  // a held company's world shifting (demo re-encounter)
  const held=Object.keys(S.holds).filter(s=>S.holds[s]>0&&BY[s]);
  if(held.length){const s=held[Math.floor(prng(hashStr('news:'+S.day))()*held.length)];
    const mv=(price(s,S.day)/price(s,Math.max(0,S.day-n))-1)*100;
    if(Math.abs(mv)>=1)S.news={sym:s,line:`${BY[s].name} moved ${mv>0?'up':'down'} ${Math.abs(mv).toFixed(1)}% while you were away`};
  }
  resolveDue();save();openYours();
  if(S.news)$('#moonbtn').classList.add('hasnews');
}

/* ---------- first open, whispers ---------- */
let whT=null;
function showWhisper(txt,dur){const w=$('#whisper');w.textContent=txt;w.classList.add('on');clearTimeout(whT);whT=setTimeout(()=>w.classList.remove('on'),dur||2800)}
function coach(k){if(S.seen&&S.coach[k])return;if(S.coach[k])return;S.coach[k]=true;save();
  const lines={pinch:'lean in \u2014 the small print hides its gems',bloom:'tap anywhere on her card to turn it over',dial:'cross the two dials \u2014 that\u2019s the instrument'};
  showWhisper(lines[k],3200)}
let firstDismissed=false;
function dismissFirst(){
  if(firstDismissed)return;firstDismissed=true;
  $('#firstline').classList.add('gone');
  if(!S.seen){S.seen=true;save()}
  setTimeout(()=>{const c=$('#compline');if(c)c.style.opacity=0},6000);
}

/* ---------- boot ---------- */
function boot(){
  layout(S.gather);resize();
  syncDials();
  // first open: gently toward the consumer neighborhood
  const target=S.gather==='sector'?(ANCHORS['retail']||ANCHORS['fmcg']):null;
  if(!S.seen&&target){cam={x:target.x*0.55,y:target.y*0.55,z:fitZ*1.28}}
  else{cam={x:0,y:0,z:fitZ};$('#firstline').classList.add('gone');firstDismissed=true;
    const c=$('#compline');if(c)c.style.opacity=0}
  resolveDue();checkPending();
  if(S.news)$('#moonbtn').classList.add('hasnews');
  requestAnimationFrame(t=>{lastT=t;tick(t)});
}
boot();
if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
